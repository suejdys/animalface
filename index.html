    <script>
        function readURL(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    $('.image-upload-wrap').hide();
                    $('#loading').show();
                    $('.file-upload-image').attr('src', e.target.result);
                    $('.file-upload-content').show();
                    $('.image-title').html(input.files[0].name);
                };
                reader.readAsDataURL(input.files[0]);
                init().then(function() {
                    console.log("hello");
                    predict();
                    $('#loading').hide();
                });
            } else {
                removeUpload();
            }
        }

        function removeUpload() {
            $('.file-upload-input').replaceWith($('.file-upload-input').clone());
            $('.file-upload-content').hide();
            $('.image-upload-wrap').show();
        }
        $('.image-upload-wrap').bind('dragover', function() {
            $('.image-upload-wrap').addClass('image-dropping');
        });
        $('.image-upload-wrap').bind('dragleave', function() {
            $('.image-upload-wrap').removeClass('image-dropping');
        });
    </script>
    <script type="text/javascript">
        let URL;
        const urlMale = "https://teachablemachine.withgoogle.com/models/LLh11judc/";
        const urlFemale = "https://teachablemachine.withgoogle.com/models/LLh11judc/";
        let model, webcam, labelContainer, maxPredictions;
        async function init() {
            if (document.getElementById("gender").checked) {
                URL = urlMale;
            } else {
                URL = urlFemale;
            }
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                var element = document.createElement("div")
                element.classList.add("d-flex");
                labelContainer.appendChild(element);
            }
        }
        async function predict() {
            var image = document.getElementById("face-image")
            const prediction = await model.predict(image, false);
            prediction.sort((a, b) => parseFloat(b.probability) - parseFloat(a.probability));
            console.log(prediction[0].className);
            var resultTitle, resultExplain, resultCeleb;
            if (document.getElementById("gender").checked) {
                gtag('event', '뉴진스 얼굴 닮은꼴 수행', {
                    'event_category': '뉴진스 얼굴 닮은꼴 수행',
                    'event_label': '남자'
                });
                switch (prediction[0].className) {
                    case "민지":
                        resultTitle = "민지상"
                        
                        
                        gtag('event', '남자 결과 민지상', {'event_category': '남자 결과'});
                        break;
                    case "해린":
                        resultTitle = "해린상"

                        
                        gtag('event', '남자 결과 해린상', {'event_category': '남자 결과'});
                        break;
                    case "하니":
                        resultTitle = "하니상"
                        
                   
                        gtag('event', '남자 결과 하니상', {'event_category': '남자 결과'});
                        break;
                    case "다니엘":
                        resultTitle = "다니엘상"
                        

                        gtag('event', '여자 결과 다니엘상', {'event_category': '여자 결과'});
                        break;
                    case "혜인":
                        resultTitle = "혜인상"
                       

                        gtag('event', '여자 결과 헤인상', {'event_category': '여자 결과'});
                        break;
                    default:
                        resultTitle = "알수없음"
                        resultExplain = ""
                        resultCeleb = ""
                        gtag('event', '남자 결과 알수없음', {'event_category': '남자 결과'});
                }
            } else {
                gtag('event', '뉴진스 얼굴 닮은꼴 수행', {
                    'event_category': '뉴진스 얼굴 닮은꼴 수행',
                    'event_label': '여자'
                });
                switch (prediction[0].className) {
                    case "민지":
                        resultTitle = "민지상"
                        

                        gtag('event', '여자 결과 민지상', {'event_category': '여자 결과'});
                        break;
                    case "해린":
                        resultTitle = "해린상"
                        
    
                        gtag('event', '여자 결과 해린상', {'event_category': '여자 결과'});
                        break;
                    case "하니":
                        resultTitle = "하니상"
                        

                        gtag('event', '여자 결과 하니상', {'event_category': '여자 결과'});
                        break;
                    case "다니엘":
                        resultTitle = "다니엘상"
                        

                        gtag('event', '여자 결과 다니엘상', {'event_category': '여자 결과'});
                        break;
                    case "혜인":
                        resultTitle = "혜인상"
                        

                        gtag('event', '여자 결과 헤인상', {'event_category': '여자 결과'});
                        break;
                    default:
                        resultTitle = "알수없음"
                        resultExplain = ""
                        resultCeleb = ""
                        gtag('event', '여자 결과 알수없음', {'event_category': '여자 결과'});
                }
            }
            var title = "<div class='" + prediction[0].className + "-animal-title'>" + resultTitle + "</div>"
            var explain = "<div class='animal-explain pt-2'>" + resultExplain + "</div>"
           
            $('.result-message').html(title + explain);
            var barWidth;
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability.toFixed(2) > 0.1) {
                    barWidth = Math.round(prediction[i].probability.toFixed(2) * 100) + "%";
                } else if (prediction[i].probability.toFixed(2) >= 0.01) {
                    barWidth = "4%"
                } else {
                    barWidth = "2%"
                }
                var labelTitle;
                switch (prediction[i].className) {
                    case "민지":
                        labelTitle = "민지상"
                        break;
                    case "해린":
                        labelTitle = "해린상"
                        break;
                    case "하니":
                        labelTitle = "하니상"
                        break
                    case "혜인":
                        labelTitle = "혜인상"
                        break;
                    case "다니엘":
                        labelTitle = "다니엘상"
                        break;
                    default:
                        labelTitle = "알수없음"
                }
                var label = "<div class='animal-label d-flex align-items-center'>" + labelTitle + "</div>"
                var bar = "<div class='bar-container position-relative container'><div class='" + prediction[i].className + "-box'></div><div class='d-flex justify-content-center align-items-center " + prediction[i].className + "-bar' style='width: " + barWidth + "'><span class='d-block percent-text'>" + Math.round(prediction[i].probability.toFixed(2) * 100) + "%</span></div></div>"
                labelContainer.childNodes[i].innerHTML = label + bar;
            }
        }
    </script>
